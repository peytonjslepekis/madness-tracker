<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Getting Mad In March</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede6;
    --muted: #888;
    --dim: #444;
    --accent: #d4a843;
    --accent-dim: rgba(212,168,67,0.15);
    --gone: #444;
    --alive: #d4a843;
    --red: #c0392b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }
  .logo { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .logo span { color: var(--accent); }
  .subtitle { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; margin-top: 4px; }
  .last-updated { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--dim); text-align: right; line-height: 1.6; }
  .refresh-btn {
    background: none; border: 1px solid var(--border2); color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 5px 10px;
    cursor: pointer; border-radius: 3px; margin-top: 4px; letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* NAV TABS */
  nav {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }
  .tab {
    font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em;
    padding: 0.85rem 1.2rem; cursor: pointer; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.2s; text-transform: uppercase; background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN LAYOUT */
  .page { display: none; padding: 2rem; }
  .page.active { display: flex; gap: 2rem; align-items: flex-start; }
  #page-rosters.active { display: block; }

  /* LEADERBOARD SIDEBAR */
  .sidebar { width: 200px; flex-shrink: 0; position: sticky; top: 1rem; }
  .sidebar-title { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; }
  .lb-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--dim); width: 16px; }
  .lb-name { font-size: 0.85rem; font-weight: 700; flex: 1; }
  .lb-name.you { color: var(--accent); }
  .lb-count { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); }
  .lb-count.leading { color: var(--accent); }
  .lb-eliminated { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--dim); margin-top: 2px; }

  /* STATUS DOT */
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot.alive { background: var(--accent); }
  .dot.out { background: var(--dim); }

  /* BRACKET MAIN */
  .bracket-main { flex: 1; min-width: 0; overflow-x: auto; }
  .bracket-scroll { display: flex; gap: 0; min-width: max-content; }

  .round-col { display: flex; flex-direction: column; min-width: 170px; }
  .round-header {
    font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em;
    color: var(--dim); text-transform: uppercase; padding: 0 8px 12px;
  }

  .matchup-wrapper { display: flex; align-items: center; }
  .matchup { display: flex; flex-direction: column; flex: 1; }

  .team-slot {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; min-height: 32px;
    border: 1px solid var(--border);
    background: var(--surface);
    position: relative;
  }
  .team-slot:first-child { border-radius: 4px 4px 0 0; border-bottom-color: transparent; }
  .team-slot:last-child { border-radius: 0 0 4px 4px; }
  .team-slot.winner { background: var(--surface2); border-color: var(--border2); }
  .team-slot.tbd { background: transparent; border-color: var(--border); }
  .team-slot.tbd .slot-name { color: var(--dim); font-style: italic; }

  .slot-seed { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--dim); min-width: 14px; text-align: right; }
  .slot-name { font-size: 0.75rem; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slot-drafter { font-family: 'DM Mono', monospace; font-size: 0.55rem; color: var(--muted); white-space: nowrap; }
  .slot-drafter.you { color: var(--accent); }

  .team-slot.eliminated .slot-name { text-decoration: line-through; color: var(--dim); }
  .team-slot.eliminated .slot-drafter { color: var(--dim); }
  .team-slot.eliminated .slot-seed { color: var(--dim); }

  /* connector SVG */
  .connector { width: 16px; flex-shrink: 0; }

  /* region label */
  .region-block { margin-bottom: 2.5rem; }
  .region-label {
    font-size: 0.65rem; font-family: 'DM Mono', monospace; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 1rem;
    padding-bottom: 6px; border-bottom: 1px solid var(--accent-dim);
  }

  /* ROSTERS PAGE */
  .rosters-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem; padding: 2rem;
  }
  .roster-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 1rem;
  }
  .roster-name { font-size: 1rem; font-weight: 800; margin-bottom: 4px; }
  .roster-name.you { color: var(--accent); }
  .roster-alive { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-bottom: 12px; }
  .roster-team {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 0; border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
  }
  .roster-team:last-child { border-bottom: none; }
  .roster-team.out .roster-team-name { text-decoration: line-through; color: var(--dim); }
  .roster-team.out .roster-team-seed { color: var(--dim); }
  .roster-team-seed { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--dim); min-width: 18px; }
  .roster-team-name { flex: 1; font-weight: 700; }

  /* loading / error */
  .status-bar {
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    color: var(--muted); padding: 0.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* champion highlight */
  .team-slot.champion { border-color: var(--accent) !important; }
  .team-slot.champion .slot-name { color: var(--accent); }

  @media (max-width: 640px) {
    header { padding: 1.2rem 1rem 1rem; flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    .logo { font-size: 1.3rem; }
    nav { padding: 0 1rem; }
    .tab { padding: 0.7rem 0.8rem; font-size: 0.65rem; }
    .page.active { flex-direction: column; padding: 1rem; gap: 1rem; }
    #page-rosters.active { padding: 0; }
    .sidebar { width: 100%; position: static; }
    .lb-row { padding: 6px 0; }
    #leaderboard { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    #leaderboard .lb-row { border-bottom: 1px solid var(--border); border-right: none; }
    .bracket-main { width: 100%; }
    .rosters-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; padding: 1rem; }
    .status-bar { padding: 0.5rem 1rem; }
  }
  @media (max-width: 400px) {
    .rosters-grid { grid-template-columns: 1fr; }
    #leaderboard { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">GETTING MAD <span>IN MARCH</span></div>
    <div class="subtitle">2026 NCAA Tournament Draft Tracker</div>
  </div>
  <div style="text-align:right">
    <div class="last-updated" id="last-updated">Loading bracket data...</div>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<div class="status-bar" id="status-bar">
  <div class="pulse"></div>
  <span id="status-text">Fetching live bracket from ESPN...</span>
</div>

<nav>
  <button class="tab active" onclick="showPage('bracket')">Bracket</button>
  <button class="tab" onclick="showPage('rosters')">Rosters</button>
</nav>

<div class="page active" id="page-bracket">
  <div class="sidebar">
    <div class="sidebar-title">Leaderboard</div>
    <div id="leaderboard">—</div>
  </div>
  <div class="bracket-main" id="bracket-main">
    <div style="color: var(--muted); font-family: 'DM Mono', monospace; font-size:0.75rem; padding: 2rem 0;">Loading...</div>
  </div>
</div>

<div class="page" id="page-rosters">
  <div class="rosters-grid" id="rosters-grid">Loading...</div>
</div>

<script>
// ─── DRAFT DATA ────────────────────────────────────────────────────────────────
const DRAFTERS = {
  Eddy:   { teams: ['Duke','Nebraska','Texas Tech','Villanova','Missouri','Furman','Penn','Prairie View A&M'], you: false },
  Peyton: { teams: ['Michigan','Arkansas','Kansas','VCU','Akron','McNeese','UNI','Queens'], you: false },
  Ryan:   { teams: ['Iowa State','Michigan State',"St. John's",'Miami FL','Santa Clara','High Point','Hawaii','LIU'], you: false },
  Reta:   { teams: ['Arizona','Alabama','Vanderbilt','UCLA','Georgia','Texas','California Baptist','Siena'], you: false },
  Connor: { teams: ['Connecticut','Virginia','Wisconsin',"St. Mary's",'Ohio State','South Florida','Hofstra','Tennessee State'], you: false },
  Corey:  { teams: ['Purdue','Gonzaga','Louisville','Kentucky','St. Louis','Miami OH','Troy','Idaho'], you: false },
  Miguel: { teams: ['Houston','Florida','BYU','Clemson','UCF','TCU','North Dakota State','Howard'], you: false },
  Pojman: { teams: ['Iowa','Illinois','North Carolina','Tennessee','Utah State','Texas A&M','Wright State','Kennesaw State'], you: false },
};

// Manually seeded eliminations from completed rounds — add to this as tournament progresses
const SEEDED_ELIMINATIONS = new Set([
  'wisconsin','north carolina','byu','ohio state','georgia',
  "st. mary's",'troy','hawaii','north dakota state','kennesaw state',
  'penn','idaho','siena','howard','mcneese','south florida'
]);

// Normalize team names for matching ESPN data
const ALIASES = {
  'Prairie View A&M': ['Prairie View A&M','Prairie View'],
  'Queens': ['Queens','Queens (NC)'],
  'Iowa State': ['Iowa State'],
  'St. John\'s': ["St. John's",'Saint Johns'],
  'Miami FL': ['Miami FL','Miami (FL)','Miami'],
  'Connecticut': ['Connecticut','UConn'],
  'St. Mary\'s': ["St. Mary's",'Saint Mary\'s'],
  'South Florida': ['South Florida','USF'],
  'Miami OH': ['Miami OH','Miami (OH)'],
  'North Dakota State': ['North Dakota State','NDSU'],
  'California Baptist': ['California Baptist','Cal Baptist'],
  'LIU': ['LIU','Long Island University'],
  'UNI': ['UNI','Northern Iowa'],
  'McNeese': ['McNeese','McNeese State'],
  'Akron': ['Akron'],
  'VCU': ['VCU','Virginia Commonwealth'],
  'Hawaii': ["Hawaii", "Hawai'i", "Hawai'i Rainbow Warriors"],
  'St. Louis': ['St. Louis', 'Saint Louis', 'Saint Louis Billikens'],
};

// Build reverse lookup: normalized ESPN name → drafter
function buildTeamMap() {
  const map = {};
  for (const [drafter, data] of Object.entries(DRAFTERS)) {
    for (const team of data.teams) {
      const keys = ALIASES[team] || [team];
      for (const k of keys) {
        map[k.toLowerCase()] = { drafter, canonical: team };
      }
    }
  }
  return map;
}
const TEAM_MAP = buildTeamMap();

function findDrafter(teamName) {
  if (!teamName) return null;
  const lower = teamName.toLowerCase();
  // exact
  if (TEAM_MAP[lower]) return TEAM_MAP[lower];
  // partial
  for (const [key, val] of Object.entries(TEAM_MAP)) {
    if (lower.includes(key) || key.includes(lower)) return val;
  }
  return null;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let bracketData = null; // parsed from ESPN
let eliminatedTeams = new Set(); // lowercase canonical names
let aliveCount = {}; // drafter → count

// ─── ESPN API ─────────────────────────────────────────────────────────────────
const PIPEDREAM = '/bracket';
 
async function loadData() {
  setStatus('Fetching live bracket from ESPN...', true);
  try {
    const r = await fetch(PIPEDREAM);
    const data = await r.json();

    processESPN(data);
    setStatus(`Live data · ${data.events?.length || 0} games loaded`, false);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(err) {
    setStatus('Could not reach ESPN API — showing draft roster data only', false);
    document.getElementById('last-updated').textContent = 'API unavailable';
    // Render with no eliminations
    computeAlive();
    render();
  }
}

function processESPN(data) {
  eliminatedTeams = new Set([...SEEDED_ELIMINATIONS]);
  bracketData = data;
  const events = data.events || [];

  for (const event of events) {
    const comps = event.competitions || [];
    for (const comp of comps) {
      const status = comp.status?.type?.completed;
      if (!status) continue;
      const teams = comp.competitors || [];
      let loser = null;
      for (const t of teams) {
        if (t.winner === false) loser = t;
      }
      if (loser) {
        const info = findDrafter(loser.team?.displayName || loser.team?.name);
        if (info) eliminatedTeams.add(info.canonical.toLowerCase());
      }
    }
  }
  computeAlive();
  render();
}

function computeAlive() {
  aliveCount = {};
  for (const [drafter, data] of Object.entries(DRAFTERS)) {
    let count = 0;
    for (const team of data.teams) {
      if (!eliminatedTeams.has(team.toLowerCase()) && !SEEDED_ELIMINATIONS.has(team.toLowerCase())) count++;
    }
    aliveCount[drafter] = count;
  }
}

function isEliminated(teamName) {
  return eliminatedTeams.has(teamName.toLowerCase()) || SEEDED_ELIMINATIONS.has(teamName.toLowerCase());
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderLeaderboard();
  renderBracket();
  renderRosters();
}

function renderLeaderboard() {
  const sorted = Object.entries(aliveCount).sort((a,b) => b[1]-a[1]);
  let rank = 1;
  let html = '';
  for (let i = 0; i < sorted.length; i++) {
    const [name, count] = sorted[i];
    if (i > 0 && sorted[i][1] < sorted[i-1][1]) rank = i+1;
    const isYou = DRAFTERS[name].you;
    const total = DRAFTERS[name].teams.length;
    html += `<div class="lb-row">
      <span class="lb-rank">${rank}</span>
      <div style="flex:1">
        <div class="lb-name ${isYou?'you':''}">${name}</div>
        <div class="lb-eliminated">${total - count} eliminated</div>
      </div>
      <div>
        <div class="lb-count ${i===0?'leading':''}">${count}</div>
      </div>
    </div>`;
  }
  document.getElementById('leaderboard').innerHTML = html;
}

function renderRosters() {
  let html = '<div class="rosters-grid">';
  for (const [name, data] of Object.entries(DRAFTERS)) {
    const alive = aliveCount[name] || 0;
    html += `<div class="roster-card">
      <div class="roster-name ${data.you?'you':''}">${name}${data.you?' ★':''}</div>
      <div class="roster-alive">${alive} of ${data.teams.length} alive</div>`;
    data.teams.forEach((team, i) => {
      const out = isEliminated(team);
      const seed = i + 1; // round they were drafted (approximate seed tier)
      html += `<div class="roster-team ${out?'out':''}">
        <div class="dot ${out?'out':'alive'}"></div>
        <span class="roster-team-name">${team}</span>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('page-rosters').innerHTML = html;
}

// ─── BRACKET RENDER ───────────────────────────────────────────────────────────
// We build a visual bracket from ESPN game data grouped by round
// ESPN rounds: 1=First Four, 2=R64, 3=R32, 4=S16, 5=E8, 6=F4, 7=NCG

const ROUND_NAMES = {2:'Round of 64', 3:'Round of 32', 4:'Sweet 16', 5:'Elite 8', 6:'Final Four', 7:'Championship'};
const REGIONS = ['South','East','Midwest','West'];

function renderBracket() {
  if (!bracketData || !bracketData.events) {
    // Render static roster-only bracket
    renderStaticRosters();
    return;
  }

  const events = bracketData.events || [];
  // Group by region then round
  const byRegion = {};
  for (const ev of events) {
    const round = ev.competitions?.[0]?.type?.id || ev.status?.period;
    const note = ev.notes?.[0]?.headline || '';
    // Get region from notes or name
    let region = 'Other';
    for (const r of REGIONS) {
      if (note.includes(r) || ev.name?.includes(r)) { region = r; break; }
    }
    if (!byRegion[region]) byRegion[region] = {};
    const roundNum = parseInt(ev.competitions?.[0]?.conferenceCompetition) || getRoundFromEvent(ev);
    if (!byRegion[region][roundNum]) byRegion[region][roundNum] = [];
    byRegion[region][roundNum].push(ev);
  }

  // Fallback: group purely by round for display
  const byRound = {};
  for (const ev of events) {
    const r = getRoundFromEvent(ev);
    if (!byRound[r]) byRound[r] = [];
    byRound[r].push(ev);
  }

  renderByRound(byRound);
}

function getRoundFromEvent(ev) {
  // ESPN encodes round in the event name or notes
  const name = ev.name || '';
  if (name.includes('First Four')) return 1;
  if (name.includes('First Round') || name.includes('Round of 64')) return 2;
  if (name.includes('Second Round') || name.includes('Round of 32')) return 3;
  if (name.includes('Sweet Sixteen') || name.includes('Sweet 16')) return 4;
  if (name.includes('Elite Eight') || name.includes('Elite 8')) return 5;
  if (name.includes('Final Four')) return 6;
  if (name.includes('National Championship') || name.includes('Championship')) return 7;
  // Try status period
  return ev.status?.period || 2;
}

function renderByRound(byRound) {
  const rounds = [2,3,4,5,6,7].filter(r => byRound[r]?.length);
  if (rounds.length === 0) { renderStaticRosters(); return; }

  let html = '';
  // Show bracket as a scrollable round-by-round flow
  html += '<div class="bracket-scroll">';

  for (const rNum of rounds) {
    const games = byRound[rNum];
    html += `<div class="round-col">`;
    html += `<div class="round-header">${ROUND_NAMES[rNum] || 'Round '+rNum}</div>`;

    const spacingMap = {2:0, 3:36, 4:100, 5:228, 6:484, 7:968};
    const gapBetween = {2:8, 3:44, 4:112, 5:240, 6:500};
    const topPad = spacingMap[rNum] || 0;

    html += `<div style="padding-top:${topPad}px; display:flex; flex-direction:column; gap:${gapBetween[rNum]||8}px;">`;

    for (const ev of games) {
      const comp = ev.competitions?.[0];
      const competitors = comp?.competitors || [];
      const completed = comp?.status?.type?.completed;

      html += `<div class="matchup">`;
      for (const team of competitors) {
        const tname = team.team?.displayName || team.team?.name || 'TBD';
        const seed = team.curatedRank?.current || team.seed || '';
        const winner = team.winner;
        const lost = completed && team.winner === false;
        const info = findDrafter(tname);
        const drafter = info?.drafter || '';
        const isYou = drafter && DRAFTERS[drafter]?.you;
        const cls = lost ? 'eliminated' : (winner ? 'winner' : '');
        html += `<div class="team-slot ${cls}">
          <span class="slot-seed">${seed}</span>
          <span class="slot-name">${tname}</span>
          ${drafter ? `<span class="slot-drafter ${isYou?'you':''}">(${drafter})</span>` : ''}
        </div>`;
      }
      if (competitors.length === 0) {
        html += `<div class="team-slot tbd"><span class="slot-name">TBD</span></div>
                 <div class="team-slot tbd"><span class="slot-name">TBD</span></div>`;
      }
      html += `</div>`;
    }

    html += `</div></div>`;

    // Connector column (skip after last round)
    if (rNum !== rounds[rounds.length-1]) {
      html += `<div style="width:20px;flex-shrink:0;"></div>`;
    }
  }

  html += '</div>';
  document.getElementById('bracket-main').innerHTML = html;
}

function renderStaticRosters() {
  // Fallback: show all drafters' teams in a simple list grouped by drafter
  let html = '<div style="color:var(--muted);font-family:\'DM Mono\',monospace;font-size:0.7rem;margin-bottom:1rem;">Live bracket unavailable — showing draft picks</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;">';
  for (const [name, data] of Object.entries(DRAFTERS)) {
    html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1rem;">
      <div style="font-size:0.9rem;font-weight:800;margin-bottom:8px;color:${data.you?'var(--accent)':'var(--text)'}">${name}</div>`;
    data.teams.forEach(team => {
      const out = isEliminated(team);
      html += `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:0.75rem;">
        <div class="dot ${out?'out':'alive'}"></div>
        <span style="${out?'text-decoration:line-through;color:var(--dim)':''};font-weight:700">${team}</span>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('bracket-main').innerHTML = html;
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function setStatus(msg, loading) {
  document.getElementById('status-text').textContent = msg;
  document.querySelector('.pulse').style.display = loading ? 'block' : 'none';
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  event.target.classList.add('active');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
computeAlive();
render();
loadData();

// Auto-refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
